version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: riffado-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      # Default preserved for backward compat with existing self-host
      # deploys. The one-line installer (scripts/install.sh) generates a
      # random POSTGRES_PASSWORD and writes it to .env. Existing operators
      # can rotate by setting POSTGRES_PASSWORD in .env, recreating the
      # `db` volume, and restoring from a backup.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: riffado
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    # Pull the published image by default.
    #   - `latest`  → newest stable release (recommended)
    #   - `0.1.0`   → pin to a specific version
    #   - `dev`     → rolling build from `main` (unstable, opt-in)
    # Override via RIFFADO_VERSION in .env. For local builds, see docker-compose.dev.yml.
    image: ghcr.io/riffado/riffado:${RIFFADO_VERSION:-latest}
    container_name: riffado-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/riffado

      # Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      APP_URL: ${APP_URL:-http://localhost:3000}
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-}

      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # Storage (optional defaults)
      DEFAULT_STORAGE_TYPE: ${DEFAULT_STORAGE_TYPE:-local}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-/app/audio}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
    volumes:
      - audio:/app/audio
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 30s
      retries: 3

volumes:
  pgdata:
    driver: local
  audio:
    driver: local
